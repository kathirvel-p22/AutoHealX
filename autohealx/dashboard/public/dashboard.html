<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoHealX Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            color: white;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }
        .success-message {
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 30px;
        }
        .back-button {
            background: white;
            color: #667eea;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-message">
            <h1>🎉 Login Successful!</h1>
            <h2>Welcome to AutoHealX Dashboard</h2>
            <p>Your authentication worked perfectly without any form refresh issues!</p>
            <p>The login form remained stable throughout the entire process.</p>
        </div>
        
        <button class="back-button" onclick="window.location.href='/'">
            ← Back to Login
        </button>
        
        <div style="margin-top: 30px; font-size: 14px; opacity: 0.8;">
            <p>✅ Form Auto-Refresh Issue: FIXED</p>
            <p>✅ Stable Input Fields: WORKING</p>
            <p>✅ Authentication Flow: COMPLETE</p>
        </div>
    </div>
</body>
</html>
